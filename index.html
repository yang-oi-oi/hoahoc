<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Công cụ tính hóa học</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    /* BACKGROUND ẢNH */
    background: url("bg-hoa-hoc.png") no-repeat center center fixed;
    background-size: cover;

    margin: 0;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
}

/* LỚP PHỦ MỜ CHO DỄ ĐỌC */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(255, 255, 255, 0.65);

    z-index: -1;
}

.header {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    box-shadow: 0 8px 32px rgba(31, 38, 135, 0.3);
    border-radius: 20px;
    margin: 20px;
}

.container {
    max-width: 500px;
    margin: 20px auto;
    padding: 20px;
}

.card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(15px);
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.label {
    font-weight: 700;
    margin-bottom: 10px;
    display: block;
}

input, select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-weight: 700;
    cursor: pointer;
}

.result {
    padding: 15px;
    border-radius: 12px;
    font-weight: bold;
    text-align: center;
    margin-top: 10px;
    display: none;
}

.green { background: #d4edda; color: #155724; }
.red { background: #f8d7da; color: #721c24; }
</style>
</head>

<body>

<div class="header">⚗️ Công cụ tính hóa học</div>

<div class="container">

<div class="card">
    <label class="label">Nhập phản ứng</label>
    <input type="text" id="reactionInput" placeholder="VD: Na2CO3 + HCl -> NaCl + H2O + CO2">
    <button onclick="phanTich(); sauPhanTich();">🔬 Phân tích</button>
</div>

<div class="card">
    <label class="label">Chọn chất cần tìm</label>
    <select id="chatCanTim" onchange="capNhatCongThuc(); taoInput();"></select>
    <p id="ct"><b>Chưa có phản ứng</b></p>
</div>

<div class="card">
    <label class="label">Nhập khối lượng</label>
    <div id="inputs"></div>
</div>

<div class="card">
    <button onclick="tinh()">🚀 Tính kết quả</button>
    <div id="kq" class="result"></div>
</div>

</div>

<script>
let reactants = [];
let products = [];

function phanTich() {
    let input = document.getElementById("reactionInput").value;

    if (!input.includes("->") && !input.includes("→")) {
        alert("Sai định dạng!");
        return;
    }

    let parts = input.split(/->|→/);
    reactants = parts[0].split("+").map(x => x.trim());
    products = parts[1].split("+").map(x => x.trim());
}

function taoDanhSachChat() {
    let select = document.getElementById("chatCanTim");
    select.innerHTML = "";

    let all = [...reactants, ...products];

    all.forEach(chat => {
        let option = document.createElement("option");
        option.value = chat;
        option.text = chat;
        select.appendChild(option);
    });
}

function taoInput() {
    let div = document.getElementById("inputs");
    let chatCanTim = document.getElementById("chatCanTim").value;

    div.innerHTML = "";

    let all = [...reactants, ...products];

    all.forEach(chat => {
        if (chat === chatCanTim) return;
        div.innerHTML += `<input class="mass" placeholder="m${chat} (g)">`;
    });
}

function sauPhanTich() {
    taoDanhSachChat();
    taoInput();
    capNhatCongThuc();
    document.getElementById("kq").style.display = "none";
}

function capNhatCongThuc() {
    let chat = document.getElementById("chatCanTim").value;
    let ct = document.getElementById("ct");

    if (!chat) return;

    if (reactants.includes(chat)) {
        ct.innerHTML = `📌 m${chat} = tổng sản phẩm - các chất phản ứng còn lại`;
    } else {
        ct.innerHTML = `📌 m${chat} = tổng phản ứng - các sản phẩm còn lại`;
    }
}

function tinh() {
    let chat = document.getElementById("chatCanTim").value;
    let inputs = document.querySelectorAll(".mass");
    let kq = document.getElementById("kq");

    let all = [...reactants, ...products];

    let reactantMass = 0;
    let productMass = 0;

    let index = 0;

    for (let c of all) {
        if (c === chat) continue;

        let value = parseFloat(inputs[index].value);

        if (isNaN(value)) {
            kq.style.display = "block";
            kq.innerHTML = "❌ Nhập thiếu dữ liệu!";
            kq.className = "result red";
            return;
        }

        if (reactants.includes(c)) {
            reactantMass += value;
        } else {
            productMass += value;
        }

        index++;
    }

    let result;

    if (reactants.includes(chat)) {
        result = productMass - reactantMass;
    } else {
        result = reactantMass - productMass;
    }

    kq.style.display = "block";
    kq.innerHTML = `✅ m${chat} = ${result} g`;
    kq.className = "result green";
}
</script>

</body>
</html>
