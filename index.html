<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Công cụ tính hóa học</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(-45deg, 
        #ff6b6b, #feca57, #48dbfb, #0abde3, 
        #ff9ff3, #54a0ff, #5f27cd, #00d2d3);
    background-size: 600% 600%;
    animation: gradientShift 20s ease infinite;
    position: relative;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(120,219,255,0.2) 0%, transparent 50%);
    backdrop-filter: blur(15px);
    z-index: 1;
}

.overlay {
    background: rgba(255,255,255,0.92);
    min-height: 100vh;
    padding-bottom: 20px;
    position: relative;
    z-index: 2;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
}

.header {
    background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.85));
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    backdrop-filter: blur(20px);
    border-bottom: 2px solid rgba(255,255,255,0.4);
    box-shadow: 0 4px 30px rgba(0,0,0,0.1);
    position: relative;
    overflow: hidden;
}

.header::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: shine 3s infinite;
}

.container {
    max-width: 500px;
    margin: 20px auto;
    padding: 15px;
}

.card {
    background: rgba(255,255,255,0.95);
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 
        0 8px 32px rgba(31,38,135,0.37),
        inset 0 1px 0 rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(15px);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #4facfe, transparent);
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 
        0 20px 60px rgba(31,38,135,0.5),
        0 0 0 1px rgba(255,255,255,0.8);
}

input, select {
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    border: 2px solid rgba(255,255,255,0.3);
    margin-bottom: 15px;
    transition: all 0.3s ease;
    background: rgba(255,255,255,0.8);
    font-size: 16px;
    backdrop-filter: blur(10px);
}

input:focus, select:focus {
    outline: none;
    border-color: #4facfe;
    box-shadow: 
        0 0 20px rgba(79, 172, 254, 0.4),
        inset 0 1px 0 rgba(255,255,255,0.8);
    transform: scale(1.02);
}

button {
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    color: white;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.4s ease;
    box-shadow: 
        0 8px 25px rgba(102, 126, 234, 0.4),
        inset 0 1px 0 rgba(255,255,255,0.3);
    position: relative;
    overflow: hidden;
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 
        0 12px 35px rgba(102, 126, 234, 0.6),
        inset 0 1px 0 rgba(255,255,255,0.4);
}

button:hover::before {
    left: 100%;
}

.result {
    padding: 15px;
    border-radius: 15px;
    font-weight: 700;
    text-align: center;
    margin-top: 15px;
    display: none;
    animation: slideIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(30px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

.green { 
    background: linear-gradient(135deg, rgba(76, 175, 80, 0.9), rgba(129, 199, 132, 0.9)); 
    color: #1b5e20; 
    border: 2px solid rgba(76, 175, 80, 0.5);
}

.red { 
    background: linear-gradient(135deg, rgba(244, 67, 54, 0.9), rgba(239, 154, 154, 0.9)); 
    color: #c62828; 
    border: 2px solid rgba(244, 67, 54, 0.5);
}

#ct {
    background: linear-gradient(135deg, rgba(238, 255, 255, 0.8), rgba(173, 216, 230, 0.6));
    padding: 15px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.5);
    font-size: 16px;
}

/* Animation cho gradient nền */
@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    25% { background-position: 100% 50%; }
    50% { background-position: 100% 100%; }
    75% { background-position: 0% 100%; }
    100% { background-position: 0% 50%; }
}

/* Particles hiệu ứng nâng cao */
@keyframes float {
    0%, 100% { 
        transform: translateY(0px) translateX(0px) rotate(0deg) scale(1);
        opacity: 0.6;
    }
    25% { 
        transform: translateY(-15px) translateX(5px) rotate(90deg) scale(1.2);
        opacity: 0.9;
    }
    50% { 
        transform: translateY(-30px) translateX(-5px) rotate(180deg) scale(0.8);
        opacity: 0.7;
    }
    75% { 
        transform: translateY(-15px) translateX(10px) rotate(270deg) scale(1.1);
        opacity: 0.8;
    }
}

@keyframes sparkle {
    0%, 100% { 
        transform: scale(0) rotate(0deg);
        opacity: 0;
    }
    50% { 
        transform: scale(1) rotate(180deg);
        opacity: 1;
    }
}

.particle {
    position: fixed;
    width: 6px;
    height: 6px;
    background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.4) 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    animation: float 8s ease-in-out infinite;
    box-shadow: 0 0 10px rgba(255,255,255,0.8);
}

.particle.sparkle {
    width: 4px;
    height: 4px;
    animation: sparkle 2s infinite;
    background: radial-gradient(circle, #fff, transparent);
}

/* Thêm nhiều particles hơn */
.particle:nth-child(1) { left: 10%; animation-delay: 0s; }
.particle:nth-child(2) { left: 20%; animation-delay: 1s; }
.particle:nth-child(3) { left: 40%; animation-delay: 2s; }
.particle:nth-child(4) { left: 70%; animation-delay: 3s; }
.particle:nth-child(5) { left: 90%; animation-delay: 4s; }
.particle:nth-child(6) { left: 15%; animation-delay: 5s; top: 20%; }
.particle:nth-child(7) { left: 60%; animation-delay: 6s; top: 30%; }
.particle:nth-child(8) { left: 30%; animation-delay: 7s; top: 60%; }
.particle:nth-child(9) { left: 80%; animation-delay: 2.5s; top: 70%; }
.particle:nth-child(10) { left: 5%; animation-delay: 4.5s; top: 40%; }
</style>
</head>

<body>

<!-- Nhiều particles hơn -->
<div class="particle sparkle" style="left:5%; top:10%; animation-delay: 0.5s;"></div>
<div class="particle" style="left:10%; animation-delay: 0s;"></div>
<div class="particle sparkle" style="left:15%; top:25%; animation-delay: 1.2s;"></div>
<div class="particle" style="left:20%; animation-delay: 1s;"></div>
<div class="particle" style="left:40%; animation-delay: 2s;"></div>
<div class="particle sparkle" style="left:45%; top:15%; animation-delay: 3.5s;"></div>
<div class="particle" style="left:70%; animation-delay: 3s;"></div>
<div class="particle" style="left:90%; animation-delay: 4s;"></div>
<div class="particle" style="left:60%; top:30%; animation-delay: 6s;"></div>
<div class="particle sparkle" style="left:30%; top:60%; animation-delay: 2.8s;"></div>

<div class="overlay">

<div class="header">⚗️ Công cụ tính hóa học</div>

<div class="container">

<div class="card">
    <label>🔬 Nhập phản ứng</label>
    <input type="text" id="reactionInput" placeholder="VD: Fe + S -> FeS">
    <button onclick="phanTich(); sauPhanTich();">🔍 Phân tích</button>
</div>

<div class="card">
    <label>🎯 Chọn chất cần tìm</label>
    <select id="chatCanTim" onchange="capNhatCongThuc(); taoInput();"></select>
    <p id="ct"><b>Chưa có phản ứng</b></p>
</div>

<div class="card">
    <label>⚖️ Nhập khối lượng</label>
    <div id="inputs"></div>
</div>

<div class="card">
    <button onclick="tinh()">🚀 Tính kết quả</button>
    <div id="kq" class="result"></div>
</div>

</div>
</div>

<script>
let reactants = [];
let products = [];

function phanTich() {
    let input = document.getElementById("reactionInput").value;

    if (!input.includes("->") && !input.includes("→")) {
        alert("Sai định dạng!");
        return;
    }

    let parts = input.split(/->|→/);
    reactants = parts[0].split("+").map(x => x.trim());
    products = parts[1].split("+").map(x => x.trim());
}

function taoDanhSachChat() {
    let select = document.getElementById("chatCanTim");
    select.innerHTML = "";

    let all = [...reactants, ...products];

    all.forEach(chat => {
        let option = document.createElement("option");
        option.value = chat;
        option.text = chat;
        select.appendChild(option);
    });
}

function taoInput() {
    let div = document.getElementById("inputs");
    let chatCanTim = document.getElementById("chatCanTim").value;

    div.innerHTML = "";

    let all = [...reactants, ...products];

    all.forEach(chat => {
        if (chat === chatCanTim) return;
        div.innerHTML += `<input class="mass" placeholder="m${chat} (g)">`;
    });
}

function sauPhanTich() {
    taoDanhSachChat();
    taoInput();
    capNhatCongThuc();
    document.getElementById("kq").style.display = "none";
}

/* HIỂN THỊ CÔNG THỨC CÓ NGOẶC */
function capNhatCongThuc() {
    let chat = document.getElementById("chatCanTim").value;
    let ct = document.getElementById("ct");

    if (!chat) return;

    let congThuc = `m${chat} = `;

    if (reactants.includes(chat)) {
        let tongSP = products.map(c => `m${c}`).join(" + ");
        let conLai = reactants.filter(c => c !== chat).map(c => `m${c}`).join(" + ");

        if (conLai) {
            congThuc += `(${tongSP}) - (${conLai})`;
        } else {
            congThuc += `(${tongSP})`;
        }

    } else {
        let tongPU = reactants.map(c => `m${c}`).join(" + ");
        let conLai = products.filter(c => c !== chat).map(c => `m${c}`).join(" + ");

        if (conLai) {
            congThuc += `(${tongPU}) - (${conLai})`;
        } else {
            congThuc += `(${tongPU})`;
        }
    }

    ct.innerHTML = "📌 " + congThuc;
}

/* TÍNH TOÁN */
function tinh() {
    let chat = document.getElementById("chatCanTim").value;
    let inputs = document.querySelectorAll(".mass");
    let kq = document.getElementById("kq");

    let all = [...reactants, ...products];

    let reactantMass = 0;
    let productMass = 0;

    let index = 0;

    for (let c of all) {
        if (c === chat) continue;

        let value = parseFloat(inputs[index].value);

        if (isNaN(value)) {
            kq.style.display = "block";
            kq.innerHTML = "❌ Nhập thiếu dữ liệu!";
            kq.className = "result red";
            return;
        }

        if (reactants.includes(c)) {
            reactantMass += value;
        } else {
            productMass += value;
        }

        index++;
    }

    let result;

    if (reactants.includes(chat)) {
        result = productMass - reactantMass;
    } else {
        result = reactantMass - productMass;
    }

    /* KIỂM TRA ÂM */
    if (result < 0) {
        kq.style.display = "block";
        kq.innerHTML = "❌ Kết quả không hợp lí, kiểm tra lại dữ liệu";
        kq.className = "result red";
        return;
    }

    kq.style.display = "block";
    kq.innerHTML = `✅ m${chat} = ${result.toFixed(2)} g`;
    kq.className = "result green";
}
</script>

</body>
</html>
