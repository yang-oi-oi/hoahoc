<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Công cụ tính hóa học</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
     margin: 0;
     min-height: 100vh;
     position: relative;
     overflow-x: hidden;
 }

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(120,219,255,0.2) 0%, transparent 50%);
    z-index: -1;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(120,219,255,0.2) 0%, transparent 50%);
    z-index: -1;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.header {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
    border-radius: 20px;
    margin: 20px;
    position: relative;
    overflow: hidden;
}

.header::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: shine 3s infinite;
}

@keyframes shine {
    0% { left: -100%; }
    100% { left: 100%; }
}

.container {
    max-width: 500px;
    margin: 20px auto;
    padding: 20px;
}

.card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(15px);
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1px solid rgba(255,255,255,0.2);
    position: relative;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 0;
    background: none;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 25px 50px rgba(0,0,0,0.15);
}

.label {
    font-weight: 700;
    margin-bottom: 10px;
    display: block;
    color: #2c3e50;
    font-size: 16px;
}

input, select {
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    border: 2px solid #e1e8ed;
    margin-bottom: 15px;
    font-size: 16px;
    transition: all 0.3s ease;
    background: rgba(255,255,255,0.8);
}

input:focus, select:focus {
    outline: none;
    border-color: #4ecdc4;
    box-shadow: 0 0 0 3px rgba(78,205,196,0.1);
    transform: scale(1.02);
}

button {
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(102,126,234,0.4);
}

button:active {
    transform: translateY(0);
}

.result {
    padding: 15px;
    border-radius: 15px;
    font-weight: 700;
    text-align: center;
    margin-top: 15px;
    display: none;
    font-size: 18px;
    backdrop-filter: blur(10px);
}

.green { 
    background: linear-gradient(135deg, #d4edda, #c3e6cb); 
    color: #155724;
    border: 2px solid #c3e6cb;
}
.red { 
    background: linear-gradient(135deg, #f8d7da, #f5c6cb); 
    color: #721c24;
    border: 2px solid #f5c6cb;
}

/* Responsive */
@media (max-width: 480px) {
    .header { margin: 10px; font-size: 20px; }
    .container { padding: 10px; }
    .card { padding: 15px; margin-bottom: 15px; }
}
</style>
</head>

<body>

<div class="header">⚗️ Công cụ tính khối lượng theo định luật bảo toàn khối lượng</div>

<div class="container">

<div class="card">
    <label class="label">Nhập phản ứng</label>
    <input type="text" id="reactionInput" placeholder="VD: Na2CO3 + HCl -> NaCl + H2O + CO2">
    <button onclick="phanTich(); sauPhanTich();">🔬 Phân tích</button>
</div>

<div class="card">
    <label class="label">Chọn chất cần tìm</label>
    <select id="chatCanTim" onchange="capNhatCongThuc(); taoInput();"></select>
    <p id="ct"><b>Chưa có phản ứng</b></p>
</div>

<div class="card">
    <label class="label">Nhập khối lượng</label>
    <div id="inputs"></div>
</div>

<div class="card">
    <button onclick="tinh()">🚀 Tính kết quả</button>
    <div id="kq" class="result"></div>
</div>

</div>

<script>
let reactants = [];
let products = [];

// PHÂN TÍCH
function phanTich() {
    let input = document.getElementById("reactionInput").value;

    if (!input.includes("->") && !input.includes("→")) {
        alert("Sai định dạng!");
        return;
    }

    let parts = input.split(/->|→/);
    reactants = parts[0].split("+").map(x => x.trim());
    products = parts[1].split("+").map(x => x.trim());
}

// TẠO DANH SÁCH
function taoDanhSachChat() {
    let select = document.getElementById("chatCanTim");
    select.innerHTML = "";

    let all = [...reactants, ...products];

    all.forEach(chat => {
        let option = document.createElement("option");
        option.value = chat;
        option.text = chat;
        select.appendChild(option);
    });
}

// TẠO INPUT
function taoInput() {
    let div = document.getElementById("inputs");
    let chatCanTim = document.getElementById("chatCanTim").value;

    div.innerHTML = "";

    let all = [...reactants, ...products];

    all.forEach(chat => {
        if (chat === chatCanTim) return;

        div.innerHTML += `<input class="mass" placeholder="m${chat} (g)">`;
    });
}

// SAU PHÂN TÍCH
function sauPhanTich() {
    taoDanhSachChat();
    taoInput();
    capNhatCongThuc();
    document.getElementById("kq").style.display = "none";
}

// CÔNG THỨC
function capNhatCongThuc() {
    let chat = document.getElementById("chatCanTim").value;
    let ct = document.getElementById("ct");

    if (!chat) return;

    if (reactants.includes(chat)) {
        ct.innerHTML = `📌 m${chat} = tổng sản phẩm - các chất phản ứng còn lại`;
    } else {
        ct.innerHTML = `📌 m${chat} = tổng phản ứng - các sản phẩm còn lại`;
    }
}

// TÍNH
function tinh() {
    let chat = document.getElementById("chatCanTim").value;
    let inputs = document.querySelectorAll(".mass");
    let kq = document.getElementById("kq");

    let all = [...reactants, ...products];

    let reactantMass = 0;
    let productMass = 0;

    let index = 0;

    for (let c of all) {
        if (c === chat) continue;

        let value = parseFloat(inputs[index].value);

        if (isNaN(value)) {
            kq.style.display = "block";
            kq.innerHTML = "❌ Nhập thiếu dữ liệu!";
            kq.className = "result red";
            return;
        }

        if (reactants.includes(c)) {
            reactantMass += value;
        } else {
            productMass += value;
        }

        index++;
    }

    let result;

    if (reactants.includes(chat)) {
        result = productMass - reactantMass;
    } else {
        result = reactantMass - productMass;
    }

    kq.style.display = "block";
    kq.innerHTML = `✅ m${chat} = ${result} g`;
    kq.className = "result green";
}
</script>

</body>
</html>
